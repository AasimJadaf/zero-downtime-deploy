name: Zero Downtime CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t zero-downtime-app .

      - name: Run Deployment Script
        run: |
          chmod +x deploy.sh
          ./deploy.sh
